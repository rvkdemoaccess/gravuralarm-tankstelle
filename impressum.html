<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Impressum – GRAVURALARM</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap');
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Nunito', sans-serif; background: #fff8e8; min-height: 100vh; }
    header { background: white; padding: 14px 24px; border-bottom: 3px solid #f5a800; box-shadow: 0 2px 12px rgba(0,0,0,0.08); text-align: center; }
    .logo { font-size: 26px; font-weight: 900; }
    .logo span:first-child { color: #e8192c; }
    .logo span:last-child { color: #f5a800; }
    main { max-width: 480px; margin: 0 auto; padding: 32px 20px 60px; }
    h1 { font-size: 22px; font-weight: 900; color: #1a1a1a; margin-bottom: 24px; }
    h2 { font-size: 13px; font-weight: 800; color: #6b6b6b; text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 8px; margin-top: 24px; }
    p { font-size: 15px; color: #1a1a1a; line-height: 1.6; font-weight: 600; }
    .card { background: white; border-radius: 18px; padding: 24px; box-shadow: 0 2px 12px rgba(0,0,0,0.07); }
    .back-btn { display: inline-flex; align-items: center; gap: 8px; margin-bottom: 24px; color: #f5a800; font-weight: 800; font-size: 14px; text-decoration: none; }
  </style>
</head>
<body>
  <header>
    <div class="logo"><span>GRAVUR</span><span>ALARM</span></div>
  </header>
  <main>
    <a href="/" class="back-btn">← Zurück</a>
    <div class="card">
      <h1>Impressum</h1>
      <h2>Angaben gemäß § 5 TMG</h2>
      <p>Helmi GmbH<br>Hüserheide 52<br>47918 Tönisvorst<br>Deutschland</p>
      <h2>Kontakt</h2>
      <p>Bei Fragen wenden Sie sich bitte an das Personal vor Ort.</p>
      <h2>Verantwortlich für den Inhalt</h2>
      <p>Helmi GmbH</p>
    </div>
  </main>
</body>
</html>
